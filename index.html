<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマホ対応！かんたん文字起こし</title>
    <style>
        /* 全体の見た目を整える（デザイン） */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        h1 {
            font-size: 1.5rem;
            color: #1a73e8;
            margin-bottom: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        /* 文字起こし結果を表示するエリア */
        #result-area {
            width: 100%;
            height: 300px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            box-sizing: border-box;
            background-color: #fafafa;
            margin-bottom: 20px;
        }

        /* ボタンのエリア（3つのボタンが綺麗に並ぶように調整） */
        .btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.98);
        }

        /* スタートボタン（緑） */
        #start-btn {
            background-color: #34a853;
            color: white;
        }

        #start-btn.recording {
            background-color: #ea4335; /* 録音中は赤色にする */
        }

        /* ★新設：コピーボタン（青） */
        #copy-btn {
            background-color: #1a73e8;
            color: white;
        }

        /* クリアボタン（灰色） */
        #clear-btn {
            background-color: #9aa0a6;
            color: white;
        }

        /* 状態を表示するテキスト */
        #status {
            font-size: 0.9rem;
            color: #666;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>🎙️ スマホ文字起こしアプリ</h1>

    <div class="container">
        <textarea id="result-area" placeholder="ここに文字こしの結果が表示されます..." readonly></textarea>
        
        <div class="btn-group">
            <button id="start-btn">スタート</button>
            <button id="copy-btn">コピー</button>
            <button id="clear-btn">クリア</button>
        </div>

        <div id="status">停止中</div>
    </div>

    <script>
        // 画面の要素をJavaScriptに登録する
        const startBtn = document.getElementById('start-btn');
        const copyBtn = document.getElementById('copy-btn');
        const clearBtn = document.getElementById('clear-btn');
        const resultArea = document.getElementById('result-area');
        const statusText = document.getElementById('status');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        let recognition;
        let isRecording = false; 

        if (!SpeechRecognition) {
            alert('お使いのブラウザは音声認識に対応していません。iPhoneはSafari、AndroidはChromeで試してみてね！');
        } else {
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true;
            recognition.continuous = true;

            // 音声をキャッチしたときの処理
            recognition.onresult = (event) => {
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                    }
                }

                if (finalTranscript !== '') {
                    resultArea.value += finalTranscript + '\n';
                    resultArea.scrollTop = resultArea.scrollHeight;
                }
            };

            // エラーが発生したとき
            recognition.onerror = (event) => {
                console.error("音声認識エラー:", event.error);
                
                if (event.error === 'not-allowed') {
                    alert('マイクの許可がありません。スマホの設定からマイクをオンにしてください。');
                    stopRecording();
                } else if (isRecording) {
                    setTimeout(() => {
                        safeStart();
                    }, 500);
                }
            };

            // 音声認識が勝手に切れてしまったときの処理
            recognition.onend = () => {
                if (isRecording) {
                    statusText.textContent = '自動停止を検知。再起動しています...';
                    safeStart();
                } else {
                    statusText.textContent = '停止中';
                }
            };
        }

        // 安全に音声認識をスタートさせる関数
        function safeStart() {
            try {
                recognition.start();
                statusText.textContent = '音声を聞き取っています...';
            } catch (e) {
                console.log("すでに起動中または準備中でした:", e.message);
            }
        }

        // 録音をスタートする関数
        function startRecording() {
            isRecording = true;
            safeStart();
            startBtn.textContent = 'ストップ';
            startBtn.classList.add('recording');
        }

        // 録音をストップする関数
        function stopRecording() {
            isRecording = false; 
            if (recognition) {
                recognition.stop();
            }
            startBtn.textContent = 'スタート';
            startBtn.classList.remove('recording');
            statusText.textContent = '停止中';
        }

        // スタート/ストップボタンが押されたとき
        startBtn.addEventListener('click', () => {
            if (!recognition) return;

            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        // ★新設：コピーボタンが押されたときの動き
        copyBtn.addEventListener('click', () => {
            if (resultArea.value === '') {
                alert('コピーするテキストがありません。');
                return;
            }

            // クリップボードにテキストをコピーする（スマホ対応）
            navigator.clipboard.writeText(resultArea.value)
                .then(() => {
                    // コピー成功時にボタンの文字を一瞬変えて分かりやすくする
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = '完了！';
                    copyBtn.style.backgroundColor = '#107c10'; // 一時的に緑色に
                    
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                        copyBtn.style.backgroundColor = '#1a73e8'; // 元の青色に戻す
                    }, 1200);
                })
                .catch(err => {
                    console.error('コピーに失敗しました: ', err);
                    alert('コピーに失敗しました。ブラウザの制限の可能性があります。');
                });
        });

        // クリアボタンが押されたときの動き
        clearBtn.addEventListener('click', () => {
            if (confirm('文字起こしの結果を消してもよろしいですか？')) {
                resultArea.value = '';
            }
        });
    </script>
</body>
</html>

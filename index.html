<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマホ対応！かんたん文字起こし</title>
    <style>
        /* 全体の見た目を整える（デザイン）- 変更なし */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        h1 {
            font-size: 1.5rem;
            color: #1a73e8;
            margin-bottom: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        #result-area {
            width: 100%;
            height: 300px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            box-sizing: border-box;
            background-color: #fafafa;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.98);
        }

        #start-btn {
            background-color: #34a853;
            color: white;
        }

        #start-btn.recording {
            background-color: #ea4335;
        }

        #copy-btn {
            background-color: #1a73e8;
            color: white;
        }

        #clear-btn {
            background-color: #9aa0a6;
            color: white;
        }

        #status {
            font-size: 0.9rem;
            color: #666;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>🎙️ スマホ文字起こしアプリ</h1>

    <div class="container">
        <textarea id="result-area" placeholder="ここに文字こしの結果が表示されます..." readonly></textarea>
        
        <div class="btn-group">
            <button id="start-btn">スタート</button>
            <button id="copy-btn">コピー</button>
            <button id="clear-btn">クリア</button>
        </div>

        <div id="status">停止中</div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const copyBtn = document.getElementById('copy-btn');
        const clearBtn = document.getElementById('clear-btn');
        const resultArea = document.getElementById('result-area');
        const statusText = document.getElementById('status');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        let recognition;
        let isRecording = false; 
        
        // ★重複防止用の履歴を保存する配列
        let sentenceHistory = [];

        if (!SpeechRecognition) {
            alert('お使いのブラウザは音声認識に対応していません。iPhoneはSafari、AndroidはChromeで試してみてね！');
        } else {
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true;
            recognition.continuous = true;

            // 音声をキャッチしたときの処理
            recognition.onresult = (event) => {
                let currentFinals = [];

                // 今回のイベントで「確定」した文字だけを抽出
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        const transcript = event.results[i][0].transcript.trim();
                        if (transcript) {
                            currentFinals.push(transcript);
                        }
                    }
                }

                // ★新規確定した文字の重複チェック
                currentFinals.forEach(text => {
                    // 直近の履歴（3件前まで）に全く同じ文字列が含まれているかチェック
                    const isDuplicate = sentenceHistory.slice(-3).includes(text);
                    
                    if (!isDuplicate) {
                        // 重複していなければ画面に追加し、履歴にも残す
                        resultArea.value += text + '\n';
                        sentenceHistory.push(text);
                        
                        // 履歴が大きくなりすぎないように100件超えたら古いものを消す
                        if (sentenceHistory.length > 100) sentenceHistory.shift();
                        
                        resultArea.scrollTop = resultArea.scrollHeight;
                    } else {
                        console.log("重複をカットしました:", text);
                    }
                });
            };

            // エラーが発生したとき
            recognition.onerror = (event) => {
                console.error("音声認識エラー:", event.error);
                if (isRecording && event.error !== 'not-allowed') {
                    setTimeout(() => {
                        safeStart();
                    }, 500);
                }
            };

            // 音声認識が勝手に切れてしまったときの処理
            recognition.onend = () => {
                if (isRecording) {
                    statusText.textContent = '自動停止を検知。再起動しています...';
                    safeStart();
                } else {
                    statusText.textContent = '停止中';
                }
            };
        }

        function safeStart() {
            try {
                recognition.start();
                statusText.textContent = '音声を聞き取っています...';
            } catch (e) {
                console.log("すでに起動中または準備中でした:", e.message);
            }
        }

        function startRecording() {
            isRecording = true;
            safeStart();
            startBtn.textContent = 'ストップ';
            startBtn.classList.add('recording');
        }

        function stopRecording() {
            isRecording = false; 
            if (recognition) {
                recognition.stop();
            }
            startBtn.textContent = 'スタート';
            startBtn.classList.remove('recording');
            statusText.textContent = '停止中';
        }

        startBtn.addEventListener('click', () => {
            if (!recognition) return;
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        copyBtn.addEventListener('click', () => {
            if (resultArea.value === '') {
                alert('コピーするテキストがありません。');
                return;
            }
            navigator.clipboard.writeText(resultArea.value)
                .then(() => {
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = '完了！';
                    copyBtn.style.backgroundColor = '#107c10';
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                        copyBtn.style.backgroundColor = '#1a73e8';
                    }, 1200);
                })
                .catch(err => {
                    alert('コピーに失敗しました。');
                });
        });

        clearBtn.addEventListener('click', () => {
            if (confirm('文字起こしの結果を消してもよろしいですか？')) {
                resultArea.value = '';
                sentenceHistory = []; // 履歴も同時にクリア
            }
        });
    </script>
</body>
</html>

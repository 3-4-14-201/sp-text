<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最強カスタム！スマホ文字起こし</title>
    <style>
        /* --- 基本の変数設定（ダークモード切り替え用） --- */
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --textarea-bg: #fafafa;
            --status-color: #666666;
        }

        /* ダークモードの時の色設定 */
        [data-theme="dark"] {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #ffffff;
            --border-color: #333333;
            --textarea-bg: #252525;
            --status-color: #aaaaaa;
        }

        /* --- 全体のデザイン --- */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 500px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.3rem;
            color: #1a73e8;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--container-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            box-sizing: border-box;
            transition: background-color 0.3s;
        }

        /* --- 文字サイズ変更用のコントロール --- */
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .size-buttons {
            display: flex;
            gap: 5px;
        }

        .mini-btn {
            padding: 5px 10px;
            font-size: 0.8rem;
            background-color: #e8f0fe;
            color: #1a73e8;
            border: 1px solid #1a73e8;
            border-radius: 5px;
            cursor: pointer;
        }
        .mini-btn.active {
            background-color: #1a73e8;
            color: white;
        }

        /* --- 文字起こし結果のエリア --- */
        #result-area {
            width: 100%;
            height: 300px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            box-sizing: border-box;
            background-color: var(--textarea-bg);
            color: var(--text-color);
            margin-bottom: 15px;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        /* --- ボタン全体のデザイン --- */
        .btn-group {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        button {
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.98);
        }

        #start-btn {
            background-color: #34a853;
            color: white;
        }
        #start-btn.recording {
            background-color: #ea4335;
        }

        #clear-btn {
            background-color: #9aa0a6;
            color: white;
        }

        /* --- ワンタップコピーボタン --- */
        #copy-btn {
            width: 100%;
            background-color: #1a73e8;
            color: white;
            margin-bottom: 15px;
        }

        #status {
            font-size: 0.9rem;
            color: var(--status-color);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-area">
        <h1>🎙️ 高機能文字起こし</h1>
        <button id="theme-btn" class="mini-btn">🌙 ダーク</button>
    </div>

    <div class="container">
        <div class="control-panel">
            <span style="font-size: 0.8rem;">文字サイズ:</span>
            <div class="size-buttons">
                <button class="mini-btn" id="size-s">小</button>
                <button class="mini-btn active" id="size-m">中</button>
                <button class="mini-btn" id="size-l">大</button>
            </div>
        </div>

        <textarea id="result-area" placeholder="ここに文字起こしの結果が表示されます..." readonly></textarea>
        
        <div class="btn-group">
            <button id="start-btn">スタート</button>
            <button id="clear-btn">クリア</button>
        </div>

        <button id="copy-btn">📋 画面の文字をコピーする</button>

        <div id="status">停止中</div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const clearBtn = document.getElementById('clear-btn');
        const copyBtn = document.getElementById('copy-btn');
        const themeBtn = document.getElementById('theme-btn');
        const resultArea = document.getElementById('result-area');
        const statusText = document.getElementById('status');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isRecording = false;

        if (!SpeechRecognition) {
            alert('お使いのブラウザは音声認識に対応していません。iPhoneはSafari、AndroidはChromeで試してね！');
        } else {
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true;
            recognition.continuous = true;

            recognition.onresult = (event) => {
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        let text = event.results[i][0].transcript;
                        
                        if (text.length > 0) {
                            if (!text.endsWith('。') && !text.endsWith('？') && !text.endsWith('！')) {
                                text += '。';
                            }
                            finalTranscript += text + '\n';
                        }
                    }
                }

                if (finalTranscript !== '') {
                    resultArea.value += finalTranscript;
                    resultArea.scrollTop = resultArea.scrollHeight;
                }
            };

            recognition.onerror = (event) => {
                console.error(event.error);
                stopRecording();
            };

            recognition.onend = () => {
                if (isRecording) {
                    recognition.start();
                }
            };
        }

        function startRecording() {
            isRecording = true;
            recognition.start();
            startBtn.textContent = 'ストップ';
            startBtn.classList.add('recording');
            statusText.textContent = '音声を聞き取っています...';
        }

        function stopRecording() {
            isRecording = false;
            recognition.stop();
            startBtn.textContent = 'スタート';
            startBtn.classList.remove('recording');
            statusText.textContent = '停止中';
        }

        startBtn.addEventListener('click', () => {
            if (!recognition) return;
            if (isRecording) { stopRecording(); } else { startRecording(); }
        });

        clearBtn.addEventListener('click', () => {
            if (confirm('文字起こしの結果を消してもよろしいですか？')) {
                resultArea.value = '';
            }
        });

        // 🛠️ コピー機能（色指定のエラーを修正しました）
        copyBtn.addEventListener('click', () => {
            if (resultArea.value === '') {
                alert('コピーする文字がありません。');
                return;
            }
            
            navigator.clipboard.writeText(resultArea.value)
                .then(() => {
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = '✅ コピーしました！';
                    copyBtn.style.backgroundColor = '#34a853'; // ここを修正しました
                    
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                        copyBtn.style.backgroundColor = '';
                    }, 1500);
                })
                .catch(err => {
                    alert('コピーに失敗しました: ' + err);
                });
        });

        // 🛠️ 文字サイズ変更機能
        const sizeButtons = {
            'size-s': '0.8rem',
            'size-m': '1rem',
            'size-l': '1.4rem'
        };

        Object.keys(sizeButtons).forEach(id => {
            document.getElementById(id).addEventListener('click', (e) => {
                document.querySelectorAll('.size-buttons .mini-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                resultArea.style.fontSize = sizeButtons[id];
            });
        });

        // 🛠️ ダークモード切り替え機能
        themeBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.textContent = '🌙 ダーク';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeBtn.textContent = '☀️ ライト';
            }
        });
    </script>
</body>
</html>
